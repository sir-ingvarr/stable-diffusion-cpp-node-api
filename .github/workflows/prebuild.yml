name: Prebuild & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-latest-large
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      # Patches are committed with LF line endings (generated on macOS / Linux).
      # On Windows runners core.autocrlf defaults to true, which converts the
      # submodule's .cpp/.hpp files to CRLF on checkout — patches then fail to
      # apply because the context lines don't match. Force LF everywhere
      # before any checkout happens.
      - name: Disable CRLF conversion (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies (skip native build)
        run: npm install --ignore-scripts

      - name: Build native module
        run: npm run build:ci

      - name: Copy binary into platform package
        shell: bash
        run: |
          NODE_FILE=$(find build -name "node_stable_diffusion.node" -type f | head -1)
          if [ -z "$NODE_FILE" ]; then
            echo "::error::Could not find node_stable_diffusion.node"
            exit 1
          fi
          PKG_DIR="npm/${{ matrix.platform }}-${{ matrix.arch }}"
          cp "$NODE_FILE" "${PKG_DIR}/node_stable_diffusion.node"

      - name: Publish platform package
        shell: bash
        run: npm publish --access public --provenance
        working-directory: npm/${{ matrix.platform }}-${{ matrix.arch }}

      - name: Package tarball for GitHub release
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          mkdir -p staging/build/Release
          cp "npm/${{ matrix.platform }}-${{ matrix.arch }}/node_stable_diffusion.node" staging/build/Release/
          TARBALL="stable-diffusion-cpp-node-api-v${PACKAGE_VERSION}-napi-v8-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          tar -czf "${TARBALL}" -C staging build/Release/node_stable_diffusion.node
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL }}
          draft: false

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish meta package
        run: npm publish --access public --provenance
